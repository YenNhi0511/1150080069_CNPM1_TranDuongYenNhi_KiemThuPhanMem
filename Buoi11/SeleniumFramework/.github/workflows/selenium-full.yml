# Lab 11 Bai 6: Full Pipeline + Allure Report publish len GitHub Pages
name: Selenium Full Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 19 * * 1-5'  # Chay moi dem tu Thu 2 - Thu 6
  workflow_dispatch:

# Quyen ghi vao GitHub Pages
permissions:
  contents: write
  pages: write

jobs:
  # ===== JOB 1: Chay test =====
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    env:
      SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
      SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Generate test data
        run: mvn compile exec:java -Dexec.mainClass="tests.TestDataGenerator" -Dexec.classpathScope=test

      - name: Run tests (${{ matrix.browser }})
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/

  # ===== JOB 2: Publish Allure Report len GitHub Pages =====
  publish-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Chrome Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: allure-results/chrome

      - name: Download Firefox Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results/firefox
        continue-on-error: true

      - name: Merge Allure results
        run: |
          mkdir -p allure-results-merged
          cp -r allure-results/chrome/* allure-results-merged/ 2>/dev/null || true
          cp -r allure-results/firefox/* allure-results-merged/ 2>/dev/null || true

      - name: Generate and publish Allure Report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results-merged
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
