# Lab 11 Bai 4: Selenium Grid 4 voi Docker Compose
# Kien truc: 1 Hub + 2 Chrome Nodes + 1 Firefox Node

version: "3.8"

services:
  # ===== Selenium Hub (Router) =====
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"  # Event Bus publish
      - "4443:4443"  # Event Bus subscribe
      - "4444:4444"  # Grid UI + WebDriver endpoint
    environment:
      - GRID_MAX_SESSION=10
      - SE_SESSION_REQUEST_TIMEOUT=300

  # ===== Chrome Node 1 =====
  chrome-node-1:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node-1
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  # ===== Chrome Node 2 =====
  chrome-node-2:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node-2
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  # ===== Firefox Node =====
  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: firefox-node
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
